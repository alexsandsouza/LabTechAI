<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício | LabTechAI</title>
    
    <!-- Meta Tags SEO -->
    <meta name="description" content="Desafios práticos de codificação. Teste seus conhecimentos agora na plataforma LabTechAI.">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/main.css">
    
    <style>
        .exercise-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            height: calc(100vh - 120px);
            padding: 20px;
        }

        .instruction-panel, .editor-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .prompt-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .prompt-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .editor-container {
            flex: 1;
            background: #0d0e22;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--primary-color);
            position: relative;
        }

        textarea#code-editor {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--secondary-color);
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.1rem;
            resize: none;
            outline: none;
        }

        .feedback-area {
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            display: none; /* Injected via JS */
            margin-top: 10px;
            animation: fadeInUp 0.3s ease;
        }

        .feedback-success { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }
        .feedback-error { background: rgba(255, 75, 43, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .hint-block {
            padding: 15px;
            background: rgba(255, 204, 0, 0.05);
            border-left: 4px solid var(--warning);
            font-size: 0.9rem;
            color: var(--warning);
            border-radius: 4px;
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .exercise-layout { grid-template-columns: 1fr; height: auto; padding: 10px; }
            .editor-container { min-height: 250px; }
        }
    </style>
</head>
<body class="bg-primary">

    <header class="navbar">
        <div class="logo-container">
            <a href="../index.html" class="logo-text" style="text-decoration: none;">LabTechAI</a>
        </div>
        <div class="nav-stats">
            <div class="stat-item" id="xp-display">
                <i class="fa-solid fa-bolt" style="color: var(--primary-color)"></i>
                <span id="xp-count">0</span>
            </div>
        </div>
    </header>

    <main class="exercise-layout">
        <!-- Lado Esquerdo: Instruções -->
        <section class="instruction-panel animate-fade">
            <div id="exercise-type-badge" style="background: var(--primary-color); color: white; padding: 4px 12px; border-radius: 20px; width: fit-content; font-size: 10px; font-weight: bold; text-transform: uppercase;">LABORATÓRIO</div>
            <h2 class="prompt-title" id="exercise-title">Desafio de Código</h2>
            <p class="prompt-text" id="exercise-prompt">Carregando desafio...</p>
            
            <div id="exercise-hint" class="hint-block" style="display: none;">
                <strong>💡 DICA:</strong> <span id="hint-text"></span>
            </div>

            <div id="feedback" class="feedback-area"></div>
        </section>

        <!-- Lado Direito: Editor -->
        <section class="editor-panel animate-fade" style="animation-delay: 0.1s;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span class="text-muted" style="font-size: 12px;"><i class="fa-solid fa-file-code"></i> index.js</span>
                <button id="btn-reset" class="btn-ghost" style="padding: 4px 8px; font-size: 12px; border-radius: 4px; border: 1px solid var(--glass-border); cursor: pointer;">Resetar</button>
            </div>
            
            <div class="editor-container">
                <textarea id="code-editor" spellcheck="false" placeholder="// Digite seu código aqui..."></textarea>
            </div>

            <button id="btn-submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px;">
                 VERIFICAR RESPOSTA <i class="fa-solid fa-play"></i>
            </button>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../scripts/state.js"></script>
    <script src="../scripts/courses.js"></script>
    <script src="../scripts/ui-utils.js"></script>
    <script src="../scripts/app.js"></script>
    <script src="../components/mentor-chat.js"></script>

    <script>
        let lessonId = null;
        let exerciseData = null;
        let fullLessonData = null;

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            lessonId = params.get('id');

            // Find exercise in course data
            const course = COURSE_DATA['logica-programacao'];
            course.modules.forEach(m => {
                const found = m.lessons.find(l => l.id === lessonId);
                if (found) {
                    fullLessonData = found;
                    exerciseData = found.exercise;
                }
            });

            if (!exerciseData) {
                window.location.href = '../index.html';
                return;
            }

            // Populate UI
            document.title = `${fullLessonData.title} | LabTechAI`;
            document.getElementById('exercise-title').textContent = fullLessonData.title;
            document.getElementById('exercise-prompt').textContent = exerciseData.prompt;
            document.getElementById('code-editor').value = exerciseData.editorInitial;
            document.getElementById('hint-text').textContent = exerciseData.hint;
            
            updateHeaderNav();
        });

        function updateHeaderNav() {
            document.getElementById('xp-count').textContent = stateManager.state.user.xp;
        }

        // Logic to verify
        document.getElementById('btn-submit').addEventListener('click', () => {
             const code = document.getElementById('code-editor').value;
             const isValid = exerciseData.validation(code);
             const feedback = document.getElementById('feedback');
             
             feedback.style.display = 'block';

             if (isValid) {
                 feedback.className = 'feedback-area feedback-success';
                 feedback.innerHTML = '<i class="fa-solid fa-circle-check"></i> <strong>Parabéns!</strong> Código validado com sucesso.';
                 ui.playSound('success');
                 
                 // Mark completed and redirect
                 setTimeout(() => {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.8 }
                    });
                    
                    stateManager.completeLesson('logica-programacao', lessonId, fullLessonData.xp);
                    
                    setTimeout(() => {
                        window.location.href = '../index.html?completed=' + lessonId;
                    }, 1500);
                 }, 500);
                 
             } else {
                 feedback.className = 'feedback-area feedback-error';
                 feedback.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> <strong>Ainda não...</strong> Verifique seu código e tente novamente.';
                 document.getElementById('exercise-hint').style.display = 'block';
                 ui.playSound('click'); // Or a subtle fail sound
             }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('code-editor').value = exerciseData.editorInitial;
        });

        // Tab in textarea support
        document.getElementById('code-editor').addEventListener('keydown', function(e) {
          if (e.key == 'Tab') {
            e.preventDefault();
            var start = this.selectionStart;
            var end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 2;
          }
        });
    </script>
</body>
</html>
